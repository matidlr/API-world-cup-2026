<ng-container *ngIf="pageState as pageState">
  <div class="empty-state" *ngIf="pageState.loading">
    <div class="empty-icon">⏳</div>
    <p>Cargando historial del equipo...</p>
  </div>

  <div class="empty-state" *ngIf="!pageState.loading && pageState.errorMessage">
    <div class="empty-icon">⚠️</div>
    <p>{{ pageState.errorMessage }}</p>
  </div>

  <ng-container *ngIf="!pageState.loading && !pageState.errorMessage">
    <div class="empty-state mt-16" *ngIf="pageState.titles.length === 0">
      <div class="empty-icon">📭</div>
      <p>No hay registros de títulos disponibles para este equipo.</p>
    </div>

    <ul class="team-history-sections" *ngIf="pageState.sections.length > 0">
      <li class="card team-history-card" *ngFor="let section of pageState.sections">
        <div class="card-header">
          <span class="card-title">{{ section.icon }} {{ section.title }}</span>
          <span class="badge badge-primary">{{ getTitlesBadge(section.count) }}</span>
        </div>

        <ul class="title-year-chips">
          <li class="year-chip" *ngFor="let chip of section.chips">{{ chip }}</li>
          <li class="year-chip" *ngIf="section.chips.length === 0">Sin datos</li>
        </ul>
      </li>
    </ul>
  </ng-container>
</ng-container>
